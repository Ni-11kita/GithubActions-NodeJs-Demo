name: Build NodeJs application
on:
  push:
    branches:
      - master
  workflow_dispatch:
jobs:
  buildnodejs:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: install nodejs versions of 18 and npm
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: install dependencies using npm
        run: npm install
      - name: run test using npm
        run: npm test
      - name: buid the application using npm
        run: npm run build
